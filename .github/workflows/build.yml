name: ZMK Build

on:
  push:
    paths:
      - "firmware/zmk-config/config/**"
      - "firmware/zmk-config/build.yaml"
      - ".github/workflows/build.yml"
  pull_request:
    paths:
      - "firmware/zmk-config/config/**"
      - "firmware/zmk-config/build.yaml"
      - ".github/workflows/build.yml"
  workflow_dispatch:

jobs:
  build:
    uses: zmkfirmware/zmk/.github/workflows/build-user-config.yml@main
    with:
      build_matrix_path: firmware/zmk-config/build.yaml
      config_path: firmware/zmk-config/config
